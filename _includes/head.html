{% include base_path %}

<meta charset="utf-8">
<!-- Dark mode anti-flash: runs before any stylesheet, sets background immediately -->
<script>try{if(localStorage.getItem('darkMode')==='true'){document.documentElement.style.background='#0d1117';document.documentElement.classList.add('dark-mode-pending');}}catch(e){}</script>

{% include seo.html %}

<link href="{% if site.atom_feed.path %}{{ site.atom_feed.path }}{% else %}{{ base_path }}/feed.xml{% endif %}" type="application/atom+xml" rel="alternate" title="{{ site.title }} Feed">

<!-- http://t.co/dKP3o1e -->
<meta name="HandheldFriendly" content="True">
<meta name="MobileOptimized" content="320">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script>
  document.documentElement.className = document.documentElement.className.replace(/\bno-js\b/g, '') + ' js ';
</script>

<!-- For all browsers -->
<link rel="stylesheet" href="{{ base_path }}/assets/css/main.css">

<meta http-equiv="cleartype" content="on">
